name: neurobarometer
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy>=1.24
  - scipy>=1.10
  - scikit-learn>=1.3
  - pandas>=2.0
  - matplotlib>=3.7
  - tqdm>=4.65
  - pip:
    - torch>=2.5.1 --index-url https://download.pytorch.org/whl/cu121
    - torchvision --index-url https://download.pytorch.org/whl/cu121
    - torchaudio --index-url https://download.pytorch.org/whl/cu121
    - mne==1.12.1
